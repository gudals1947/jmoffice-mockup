name: Sync Naver Blog Posts

on:
  schedule:
    # 매일 02:00 KST (17:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch-posts.js'
      - '.github/workflows/sync-blog.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest blog posts
        run: node scripts/fetch-posts.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json"
          else
            git commit -m "chore: sync blog posts ($(date -u +%Y-%m-%d))"
            git push
          fi
